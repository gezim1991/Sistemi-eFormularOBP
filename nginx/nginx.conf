server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Use Docker's embedded DNS so upstream hostnames resolve dynamically
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    set $backend  http://backend:8000;
    set $frontend http://frontend:3000;

    # Django REST API
    location /api/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Django Admin panel (renamed to avoid conflict with frontend /admin routes)
    location /django-admin/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django static files (admin CSS/JS)
    location /django-static/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Uploaded media files
    location /media/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        expires 7d;
    }

    # All other requests → TanStack Start SSR (Node.js)
    location / {
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
