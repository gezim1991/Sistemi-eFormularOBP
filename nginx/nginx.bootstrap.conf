# Used ONLY once, before the first Let's Encrypt certificate exists.
# nginx.conf's HTTPS server block fails to start without real cert files at
# /etc/letsencrypt/live/prokurimet.obp.al/, so this HTTP-only config is mounted
# temporarily to serve the site + the ACME HTTP-01 challenge, get the first
# certificate via certbot, then swap back to nginx.conf. See deploy notes.
server {
    listen 80;
    server_name prokurimet.obp.al;

    client_max_body_size 20M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    set $backend  http://backend:8000;
    set $frontend http://frontend:3000;

    location /api/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /django-admin/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /django-static/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        expires 7d;
    }

    location / {
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
